<script type="text/babel">

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

<body>
<div id="root" style="min-height:100vh;display:flex;align-items:center;justify-content:center;"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ══════════════════════ CANVAS HELPERS ══════════════════════ */
function seededRng(seed) {
  let s=(seed^0xdeadbeef)>>>0;
  return ()=>{ s=Math.imul(s^s>>>15,1|s); s^=s+Math.imul(s^s>>>7,61|s); return ((s^s>>>14)>>>0)/0xffffffff; };
}
const PALETTES=[
  ['#6B3F1C','#A0622A','#C8894A','#E8CFA0'],['#3D2012','#7A4520','#B87840','#D4A870'],
  ['#2C1A0E','#5C3317','#9B6B3A','#C49060'],['#4A2C16','#8B5930','#C48B5A','#E0B880'],
  ['#1E1008','#4B2810','#8C5020','#BA8040'],['#3A200A','#6A3A18','#AA7040','#D4A868'],
];
function makeCoffeeCanvas(seed,size){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const ctx=c.getContext('2d'),rng=seededRng(seed),pal=PALETTES[Math.floor(rng()*PALETTES.length)];
  const bg=ctx.createRadialGradient(size*.4,size*.35,0,size*.5,size*.5,size*.75);
  bg.addColorStop(0,pal[3]); bg.addColorStop(.55,pal[2]); bg.addColorStop(1,pal[0]);
  ctx.fillStyle=bg; ctx.fillRect(0,0,size,size);
  const bx=size*.5,by=size*.56,bw=size*.34,bh=size*.28;
  ctx.beginPath();
  ctx.moveTo(bx-bw*.92,by-bh*.5);
  ctx.bezierCurveTo(bx-bw*.95,by+bh*.5,bx-bw*.55,by+bh*.9,bx,by+bh*.92);
  ctx.bezierCurveTo(bx+bw*.55,by+bh*.9,bx+bw*.95,by+bh*.5,bx+bw*.92,by-bh*.5);
  ctx.closePath(); ctx.fillStyle='rgba(0,0,0,0.38)'; ctx.fill();
  const fr=bw*.58,foam=ctx.createRadialGradient(bx,by-bh*.08,0,bx,by-bh*.08,fr);
  foam.addColorStop(0,'rgba(245,225,195,0.96)'); foam.addColorStop(.6,'rgba(210,170,120,0.75)'); foam.addColorStop(1,'rgba(140,90,40,0.1)');
  ctx.beginPath(); ctx.ellipse(bx,by-bh*.08,fr,fr*.82,0,0,Math.PI*2); ctx.fillStyle=foam; ctx.fill();
  ctx.save(); ctx.translate(bx,by-bh*.08);
  for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2-Math.PI/2;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(Math.cos(a)*fr*.3,Math.sin(a)*fr*.3,Math.cos(a+.8)*fr*.55,Math.sin(a+.8)*fr*.55,Math.cos(a+.4)*fr*.7,Math.sin(a+.4)*fr*.7);ctx.strokeStyle=`rgba(100,55,20,${.2+rng()*.1})`;ctx.lineWidth=size*.025;ctx.lineCap='round';ctx.stroke();}
  ctx.restore();
  ctx.beginPath(); ctx.arc(bx+bw*.88,by,bh*.3,-Math.PI*.38,Math.PI*.38); ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=size*.045; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(bx,by+bh*.98,bw*1.1,bh*.17,0,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill();
  const vig=ctx.createRadialGradient(size/2,size/2,size*.28,size/2,size/2,size/1.3);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,size,size); return c;
}
function getCupBodyPath(ctx,x,y,w,h,type){
  const cx=x+w/2; ctx.beginPath();
  if(type===0){const ty=y+h*.23,rx=w*.36,ry=h*.068;ctx.moveTo(cx-rx,ty);ctx.bezierCurveTo(cx-rx-w*.09,y+h*.57,cx-w*.23,y+h*.84,cx-w*.18,y+h*.88);ctx.quadraticCurveTo(cx,y+h*.97,cx+w*.18,y+h*.88);ctx.bezierCurveTo(cx+w*.23,y+h*.84,cx+rx+w*.09,y+h*.57,cx+rx,ty);ctx.ellipse(cx,ty,rx,ry,0,0,Math.PI,false);}

function makeStickerDataURL(seed,size=90){
  const rng=seededRng(seed),type=Math.floor(rng()*4),rot=(rng()-.5)*14;
  const PAD=Math.round(size*.22),total=size+PAD*2;
  const c=document.createElement('canvas');c.width=c.height=total;
  const ctx=c.getContext('2d'),photo=makeCoffeeCanvas(seed,size*2);

  drawHandle(ctx,PAD,PAD,size,size,type,'#fff',size*.065);

}

/* ══════════════════════ STICKER ══════════════════════ */
function CoffeeSticker({seed,size=52,delay=0,onClick}){
  const {url,rot}=useMemo(()=>makeStickerDataURL(seed,90),[seed]);

    <div onClick={onClick} style={{'--rot':`${rot}deg`,'--r0':`${rot-12}deg`,width:p,height:p,animation:`stickerIn 0.4s cubic-bezier(0.34,1.56,0.64,1) ${delay}ms both`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:onClick?'pointer':'default'}}>

    </div>

}

function CameraModal({onDone,onClose}){
  const [ready,setReady]=useState(false);

  const streamRef=useRef(null);
  const seed=useMemo(()=>Math.floor(Date.now()/1000)%9999+1,[]);

  useEffect(()=>{
    let cancelled=false;
    async function startCam(){
      try{
        const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
        if(cancelled){s.getTracks().forEach(t=>t.stop());return;}
        streamRef.current=s;
        if(videoRef.current){videoRef.current.srcObject=s;}
        setTimeout(()=>{if(!cancelled)setReady(true);},1200);

        if(!cancelled)setCamError(e.name==='NotAllowedError'?'需要相机权限，请在浏览器设置中允许':'无法启动相机: '+e.message);
      }

    startCam();
    return()=>{cancelled=true;if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());};

  const shoot=()=>{if(flash||!ready)return;setFlash(true);setTimeout(()=>{setFlash(false);setShowRecord(true);},320);};

// Animated number counter
function AnimCounter({value}){
  const [disp,setDisp]=useState(value);
  const prev=useRef(value);
  const raf=useRef(null);
  useEffect(()=>{
    const s=prev.current,e=value,dur=380;
    const t0=Date.now();
    const tick=()=>{
      const p=Math.min((Date.now()-t0)/dur,1);
      const ease=1-Math.pow(1-p,3);
      setDisp(Math.round(s+(e-s)*ease));
      if(p<1)raf.current=requestAnimationFrame(tick);
    };
    raf.current=requestAnimationFrame(tick);
    prev.current=value;
    return()=>cancelAnimationFrame(raf.current);
  },[value]);
  return <>{disp}</>;
}

// Timeline visualization
function CoffeeTimeline({caffeineMg}){
  const now=new Date();
  const hour=now.getHours()+now.getMinutes()/60;
  const START=6,END=22,RANGE=END-START;
  const zones=[
    {s:6,e:9,type:'avoid'},{s:9,e:9.5,type:'ok'},
    {s:9.5,e:11.5,type:'best'},{s:11.5,e:13.5,type:'ok'},
    {s:13.5,e:15,type:'best'},{s:15,e:17,type:'ok'},
    {s:17,e:22,type:'avoid'},
  ];
  const ZONE_COLOR={best:'rgba(52,199,89,0.28)',ok:'rgba(255,179,64,0.22)',avoid:'rgba(255,69,58,0.18)'};
  const nowPct=Math.max(0,Math.min(100,(hour-START)/RANGE*100));
  const curZone=zones.find(z=>hour>=z.s&&hour<z.e)||zones[zones.length-1];
  const STATUS={best:{text:'Great time for coffee',color:'#34C759'},ok:{text:'Decent window',color:'#FF9500'},avoid:{text:'Better to wait',color:'#FF3B30'}};
  const st=STATUS[curZone.type];
  const ticks=[6,9,12,15,18,21];
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:10,letterSpacing:1.8,color:'#B0B0B8',fontWeight:500}}>BEST TIME TODAY</div>
        <div style={{fontSize:11,color:st.color,fontWeight:500}}>{st.text}</div>
      </div>
      <div style={{position:'relative',height:32,borderRadius:16,overflow:'hidden',background:'rgba(0,0,0,0.04)'}}>
        {zones.map((z,i)=><div key={i} style={{position:'absolute',left:`${(z.s-START)/RANGE*100}%`,width:`${(z.e-z.s)/RANGE*100}%`,top:0,bottom:0,background:ZONE_COLOR[z.type]}}/>)}
        {/* Caffeine curve overlay */}
        <div style={{position:'absolute',inset:0,opacity:.15,background:`linear-gradient(to right,transparent ${nowPct*.6}%,rgba(255,149,0,0.5) ${nowPct}%,transparent ${Math.min(nowPct+15,100)}%)`}}/>
        {/* Now marker */}
        <div style={{position:'absolute',left:`${nowPct}%`,top:0,bottom:0,width:2,background:'#1A1A1A',transform:'translateX(-50%)',zIndex:5}}>
          <div style={{position:'absolute',top:-3,left:'50%',transform:'translateX(-50%)',width:8,height:8,borderRadius:4,background:'#1A1A1A'}}/>
        </div>
      </div>
      <div style={{position:'relative',height:14,marginTop:2}}>
        {ticks.map(h=>(
          <div key={h} style={{position:'absolute',left:`${(h-START)/RANGE*100}%`,transform:'translateX(-50%)',fontSize:8,color:'#C0C0C8'}}>
            {h<12?`${h}a`:h===12?'12p':`${h-12}p`}
          </div>
        ))}
      </div>
    </div>
  );
}

// Minimal line-art cup SVG
function MinimalCup({scale=1,opacity=1}){
  const w=72*scale,h=82*scale;
  return (
    <svg width={w} height={h} viewBox="0 0 72 82" fill="none" style={{opacity,display:'block'}}>
      <path d="M12 18 C10 48 16 63 36 66 C56 63 62 48 60 18 Z" fill="rgba(180,120,60,0.1)" stroke="#8B5930" strokeWidth="1.8" strokeLinejoin="round"/>
      <ellipse cx="36" cy="18" rx="24" ry="5.5" fill="rgba(220,185,140,0.5)" stroke="#8B5930" strokeWidth="1.6"/>
      <ellipse cx="36" cy="18" rx="17" ry="3.8" fill="rgba(240,215,180,0.85)"/>
      <path d="M60 30 C72 30 72 52 60 52" stroke="#8B5930" strokeWidth="1.6" fill="none" strokeLinecap="round"/>
      <ellipse cx="36" cy="67" rx="27" ry="5" fill="rgba(180,120,60,0.08)" stroke="#8B5930" strokeWidth="1.2"/>
    </svg>
  );
}

// Cup stack (qty cups, each offset)
function CupStack({size,qty}){
  const scale=CUP_SCALE[size];
  const items=Array.from({length:Math.min(qty,5)},(_,i)=>i);
  const cupH=82*scale;
  const stackStep=14;
  const totalH=cupH+(items.length-1)*stackStep+8;
  return (
    <div style={{position:'relative',width:'100%',height:totalH,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      {items.map(i=>{
        const depth=items.length-1-i; // 0=front, N=back
        const yOffset=depth*stackStep;
        const sc=Math.pow(.93,depth);
        const op=.5+.5*(1-depth/Math.max(items.length-1,1)*.5);
        return (
          <div key={i} style={{
            position:'absolute',bottom:yOffset,
            transform:`scale(${sc*scale})`,transformOrigin:'bottom center',
            zIndex:i,
            animation:i===items.length-1?`cupSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1)`:'none',
          }}>
            <MinimalCup opacity={op}/>
          </div>
        );
      })}
    </div>
  );
}
